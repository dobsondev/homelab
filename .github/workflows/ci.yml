name: CI

#
# This workflow runs on pull requests to the main branch and performs the 
# following checks:
# 1. Lints all YAML files in the argocd/ directory using yamllint
# 2. Lints any custom Helm Charts:
#    - Gotth App Helm Chart located at argocd/helm/charts/gotth-app
#

on:
  pull_request:
    branches:
      - main

jobs:
  lint-yaml:
    name: Lint YAML Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Lint YAML Files (Relaxed Rules)
        run: yamllint -d relaxed argocd/**/*.yml

  lint-gotth-app-helm-chart:
    name: Lint Gotth App Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0

      - name: Lint Helm Chart
        run: helm lint argocd/helm/charts/gotth-app