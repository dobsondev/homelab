apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    # https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/Chart.yaml
    targetRevision: 77.13.0
    helm:
      values: |
        crds:
          enabled: true
        prometheus:
          prometheusSpec:
            retention: 30d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 50Gi
        grafana:
          admin:
            existingSecret: grafana-admin-secret
            userKey: admin-user
            passwordKey: admin-password
          persistence:
            enabled: true
            size: 10Gi
          additionalDataSources:
            - name: Loki
              type: loki
              url: http://loki-stack-gateway:80
              access: proxy
              isDefault: false
              jsonData:
                derivedFields:
                  - datasourceUid: tempo
                    matcherRegex: '"traceID":"(\w+)"'
                    name: TraceID
                    url: '$${__value.raw}'
            - name: Tempo
              type: tempo
              url: http://tempo.monitoring.svc.cluster.local:3100
              access: proxy
              isDefault: false
              uid: tempo
              jsonData:
                tracesToLogsV2:
                  datasourceUid: loki
                  filterByTraceID: true
                  filterBySpanID: false
                serviceMap:
                  datasourceUid: prometheus
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-production
            hosts:
              - grafana.homelab.dobson.dev
            tls:
              - secretName: grafana-tls
                hosts:
                  - grafana.homelab.dobson.dev
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: grafana-admin-secret
      jsonPointers:
        - /data
